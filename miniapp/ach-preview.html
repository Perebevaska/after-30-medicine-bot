<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ачивки — превью стилей</title>
<style>
  :root { --bronze1:#c98a52; --bronze2:#9c6231; --silver1:#cdd4db; --silver2:#9aa3ad; --gold1:#e7be5e; --gold2:#c2922c; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f0f2f5; color:#111; }
  .toolbar { position:sticky; top:0; background:#fff; border-bottom:1px solid #e2e6ea; padding:12px 16px; display:flex; gap:10px; align-items:center; z-index:10; }
  .toolbar button { font:inherit; padding:6px 12px; border-radius:8px; border:1px solid #ccc; background:#fff; cursor:pointer; }
  .toolbar button.active { background:#2b8a9e; color:#fff; border-color:#2b8a9e; }
  .wrap { padding:20px 16px 60px; max-width:760px; margin:0 auto; }
  body.dark { background:#17212b; color:#fff; }
  body.dark .style-card { background:#1d2733; border-color:#2a3744; }
  body.dark .ach-name { color:#cdd6df; }
  body.dark .style-h { color:#fff; }
  body.dark .hint { color:#8a9aa9; }
  .style-card { background:#fff; border:1px solid #e2e6ea; border-radius:16px; padding:18px; margin-bottom:18px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .style-h { font-size:17px; font-weight:700; margin:0 0 4px; }
  .hint { font-size:12px; color:#7a8590; margin:0 0 14px; }
  .row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; text-align:center; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:7px; }
  .ach-name { font-size:11px; font-weight:500; line-height:1.2; }
  svg { width:26px; height:26px; }

  /* ===== база медальона ===== */
  .b { width:54px; height:54px; display:grid; place-items:center; }

  /* 0. ТЕКУЩИЙ — глянцевый градиент (конфета) */
  .s0 { border-radius:50%; color:#fff; border:1px solid rgba(255,255,255,.30);
        box-shadow:0 2px 6px rgba(0,0,0,.20), inset 0 1px 1.5px rgba(255,255,255,.45), inset 0 -2px 4px rgba(0,0,0,.16); }
  .s0 svg { filter:drop-shadow(0 1px 1px rgba(0,0,0,.30)); }
  .s0.bronze { background:linear-gradient(145deg,#e6a972,#a85e2e); }
  .s0.silver { background:linear-gradient(145deg,#e3e9ef,#97a1ab); }
  .s0.gold   { background:linear-gradient(145deg,#f7d670,#d39a23); }
  .s0.locked { background:#e6eaee; color:#9aa3ad; border-color:transparent; box-shadow:inset 0 0 0 1px #d7dde2; }
  .s0.locked svg { filter:none; }

  /* A. КОНТУРНЫЕ (ghost) */
  .sA { border-radius:50%; background:transparent; border:2px solid var(--c); color:var(--c);
        box-shadow:inset 0 0 0 6px color-mix(in srgb, var(--c) 8%, transparent); }
  .sA.bronze { --c:#a8702f; }
  .sA.silver { --c:#7c8893; }
  .sA.gold   { --c:#bf911f; }
  .sA.locked { --c:#b3bcc4; border-style:dashed; }

  /* B. МАТОВАЯ МЕДАЛЬ (металл, low chroma, без глянца, рант) */
  .sB { border-radius:50%; color:var(--engrave);
        background:var(--metal); border:2px solid var(--rim);
        box-shadow:inset 0 0 0 3px color-mix(in srgb, var(--metal) 70%, #000 6%); }
  .sB.bronze { --metal:#bd8a5e; --rim:#9c6c42; --engrave:#6e4a28; }
  .sB.silver { --metal:#c4ccd3; --rim:#a3acb5; --engrave:#71797f; }
  .sB.gold   { --metal:#d8b25a; --rim:#b48f30; --engrave:#7e5f18; }
  .sB.locked { --metal:#dde2e6; --rim:#c7cdd2; --engrave:#aab2b9; color:#aab2b9; }

  /* C. ПЛИТКА (squircle, плоский мягкий тон) */
  .sC { border-radius:16px; color:#fff; background:var(--tile);
        box-shadow:0 1px 2px rgba(0,0,0,.12); }
  .sC.bronze { --tile:#b87a44; }
  .sC.silver { --tile:#9aa3ad; }
  .sC.gold   { --tile:#cb9b2e; }
  .sC.locked { --tile:#e6eaee; color:#9aa3ad; }
</style>
</head>
<body>
<div class="toolbar">
  <strong>Ачивки — стили</strong>
  <button id="lightBtn" class="active" onclick="document.body.classList.remove('dark');setActive('lightBtn')">Светлая</button>
  <button id="darkBtn" onclick="document.body.classList.add('dark');setActive('darkBtn')">Тёмная</button>
  <span class="hint" style="margin-left:auto">тиры тут разные (бронза/серебро/золото) — показать диапазон</span>
</div>
<div class="wrap" id="wrap"></div>

<script>
function setActive(id){ document.getElementById('lightBtn').classList.toggle('active', id==='lightBtn'); document.getElementById('darkBtn').classList.toggle('active', id==='darkBtn'); }

const GLYPH = {
  pill:'<path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/>',
  flame:'<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>',
  target:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
  lock:'<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>'
};
function svg(name){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">'+GLYPH[name]+'</svg>'; }

// 3 ачивки + их тир для демонстрации диапазона цветов
const ACH = [
  { name:'Первые шаги', glyph:'pill',   tier:'bronze' },
  { name:'Неделя подряд', glyph:'flame', tier:'silver' },
  { name:'Точный месяц', glyph:'target', tier:'gold' },
];
const STYLES = [
  { cls:'s0', title:'0. Текущий (глянец-«конфета»)', hint:'для сравнения — то что сейчас' },
  { cls:'sA', title:'A. Контурные (ghost)', hint:'прозрачный фон, цветной контур + глиф — Apple Fitness/Duolingo' },
  { cls:'sB', title:'B. Матовая медаль', hint:'приглушённый металл, без глянца, рант-обод, глиф-гравировка' },
  { cls:'sC', title:'C. Плитка (squircle)', hint:'скруглённый квадрат, плоский мягкий тон, белый глиф' },
];

const wrap = document.getElementById('wrap');
STYLES.forEach(st => {
  const card = document.createElement('div'); card.className='style-card';
  let cells = ACH.map(a =>
    `<div class="cell"><span class="b ${st.cls} ${a.tier}">${svg(a.glyph)}</span><span class="ach-name">${a.name}</span></div>`
  ).join('');
  // + заблокированная
  cells += `<div class="cell"><span class="b ${st.cls} locked">${svg('lock')}</span><span class="ach-name">Заблок.</span></div>`;
  card.innerHTML = `<h3 class="style-h">${st.title}</h3><p class="hint">${st.hint}</p><div class="row">${cells}</div>`;
  wrap.appendChild(card);
});
</script>
</body>
</html>
